<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{partials/_header :: common_header(~{::title/text()},~{::link},~{::meta})}">
  <!-- Custom meta data for this template-->
  <meta name="description" content="meo home page">
  <meta name="author" content="mfano">
  <!-- Custom title for this page-->
  <title>MoE | Admin</title>
  <!-- Custom styles for this page-->
</th:block>

<body style="background-image: url('/img/mfano-bg.png'); background-size:100% 100%; height:100%;">

  <!-- ======= Header ======= -->
  <th:block th:insert="~{partials/_topbar}" />
  <!-- =====End Header===== -->

  <!-- ======= Sidebar ======= -->
  <th:block th:insert="~{partials/_sidebar}" />
  <!-- =====End Sidebar=====-->

  <!-- ======Main===== -->
  <main id="main" class="main">

    <div class="pagetitle">
      <h2>Admin Dashboard</h2>

      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/home"><i class="bi bi-house-door"></i>
              <span>Home</span></a></li>
          <li class="breadcrumb-item active"><i class="bi bi-record-fill"></i>Dashboard</li>
        </ol>
      </nav>
    </div><!-- End Page Title -->

    <section class="section dashboard">
      <!-- User List -->
      <div class="col-12" th:if="${users != null}">
        <div class="card recent-sales overflow-auto">

          <div class="filter">
            <a class="icon" data-bs-toggle="modal" data-bs-target="#u"><i class="bi bi-plus"></i></a>
          </div>

          <div class="card-body">
            <h5 class="card-title">Registered Users</h5>
            <table class="table datatable table-striped table-hover col-sm-12">
              <thead class="table-dark">
                <tr>
                  <th>#</th>
                  <th>User</th>
                  <th>Roles</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="u, stat : ${users}">
                  <td th:text="${stat.count}"></td>
                  <td th:text="${u.email}"></td>
                  <td>
                    <a class="btn btn-sm btn-warning" th:href="@{'/admin/manage-user/' + ${u.id}}"><i
                        class="bi bi-pen"></i></a>
                  </td>
                  <td th:switch="${u.enabled} ? 'Yes': 'No'">
                    <span th:case="'Yes'" class="btn btn-sm btn-success">Active</span>
                    <span th:case="'No'" class="btn btn-sm btn-primary">Disabled</span>
                  </td>
                  <td>
                    <div class="d-flex flex-wrap gap-1">
                      <a th:href="@{'/admin/toggle/' + ${u.id}}" class="btn btn-sm btn-warning">Toggle</a>
                      <a th:href="@{'/admin/delete/' + ${u.id}}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Delete this user?')">Delete</a>
                      <a th:href="@{'/admin/resend/' + ${u.id}}" class="btn btn-sm btn-info">Resend</a>

                      <form th:action="@{'/admin/reset-password/' + ${u.id}}" method="post" class="d-inline-flex">
                        <input type="password" name="newPassword" placeholder="New Password"
                          class="form-control form-control-sm d-inline w-auto" required>
                        <button class="btn btn-sm btn-secondary" type="submit">Reset</button>
                      </form>
                    </div>
                  </td>

                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Audit List -->
      <div class="col-12" th:if="${auditEntries != null}">
        <div class="card recent-sales overflow-auto">

          <div class="filter">
            <a class="icon" href="#" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></a>
            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
              <li class="dropdown-header text-start">
                <h6>Filter</h6>
              </li>

              <li><a class="dropdown-item" href="#">Today</a></li>
              <li><a class="dropdown-item" href="#">This Month</a></li>
              <li><a class="dropdown-item" href="#">This Year</a></li>
            </ul>
          </div>

          <div class="card-body">
            <h5 class="card-title">Audit log (latest) <span>| Today</span></h5>
            <table class="table datatable table-sm">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Action</th>
                  <th>By</th>
                  <th>Details</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="a, stat : ${auditEntries}">
                  <td th:text="${stat.count}"></td>
                  <td th:text="${a.action}"></td>
                  <td th:text="${a.performedBy}"></td>
                  <td th:text="${a.details}"></td>
                  <td th:text="${a.timestamp}"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </section>

    <!-- User Modal-->
    <div class="modal fade" id="u" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Create New User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form class="py-2 px-4" th:action="@{/admin/create}" method="post">
            <div class="row mb-3">
              <label class="col-md-6 col-lg-4 col-form-label">Email</label>
              <div class="col-md-6 col-lg-8">
                <input type="email" class="form-control" name="email" placeholder="Email" required>
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-md-6 col-lg-4 col-form-label">Password</label>
              <div class="col-md-6 col-lg-8">
                <input type="password" class="form-control" name="password" placeholder="Password" required>
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-md-6 col-lg-4 col-form-label">Confirm</label>
              <div class="col-md-6 col-lg-8">
                <input type="password" class="form-control" name="confirm" placeholder="confirm password" required>
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-md-6 col-lg-4 col-form-label">Role</label>
              <div class="col-md-6 col-lg-8">
                <select class="form-select" name="role" required>
                  <option th:each="r : ${roles}" th:text="${r.name}" th:value="${r.name}">USER</option>
                </select>
              </div>
            </div>

            <div class="text-end">
              <button type="reset" class="btn btn-warning">clear</button>
              <button type="submit" class="btn btn-primary">save</button>
            </div>
          </form>
        </div>
      </div>
    </div><!-- End User Modal-->

  </main><!-- =====End #main===== -->

  <!-- =====footer===== -->
  <th:block th:insert="~{partials/_footer}" />
</body>

</html>
