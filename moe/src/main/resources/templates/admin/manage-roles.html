<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{partials/_header :: common_header(~{::title/text()},~{::link},~{::meta})}">
	<!-- Custom meta data for this template-->
	<meta name="description" content="meo home page">
	<meta name="author" content="mfano">
	<!-- Custom title for this page-->
	<title>MoE | Manage Roles</title>
	<!-- Custom styles for this page-->
</th:block>

<body>

	<!-- ======= Header ======= -->
	<th:block th:insert="~{partials/_topbar}" />
	<!-- =====End Header===== -->

	<!-- ======= Sidebar ======= -->
	<th:block th:insert="~{partials/_sidebar}" />
	<!-- =====End Sidebar=====-->

	<!-- ======Main===== -->
	<main id="main" class="main">

		<div class="pagetitle">
			<h2>Admin Dashboard</h2>
			<p class="text-muted">Manage users, roles and accounts.</p>

			<nav>
				<ol class="breadcrumb">
					<li class="breadcrumb-item"><a href="/">Home</a></li>
					<li class="breadcrumb-item active">Dashboard</li>
				</ol>
			</nav>
		</div><!-- End Page Title -->

		<section class="section dashboard">
			<div class="row">
				<h4>Details and Assigned User Roles</h4>
				<div class="col-lg-5">
					<div class="panel bordered-primary">
						<div class="panel-body">
							<div class="form-group">
								<label class="control-label col-sm-4">Id</label>
								<div class="col-sm-6">
									<input name="id" th:value="${user.id}" disabled type="text" size="16"
										class="form-control">
								</div>
							</div>
							<div class="form-group">
								<label class="control-label col-sm-4">Firstname</label>
								<div class="col-sm-6">
									<input name="fin" th:value="${user.fin}" class="form-control" size="16" type="text"
										disabled />
								</div>
							</div>
							<div class="form-group">
								<label class="control-label col-sm-4"> Email</label>
								<div class="col-sm-6">
									<input name="email" th:value="${user.email}" type="text" class=" form-control"
										disabled />
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="col-lg-5">
					<table class="table table-striped table-advance table-hover">
						<tbody>
							<tr>
								<th>#</th>
								<th><i class="icon_profile"></i> Name</th>
								<th><i class="icon_cogs"></i> Action</th>
							</tr>
							<tr th:each="userRole, stat:${userRoles}">
								<td th:text="${stat.count}">1</td>
								<td th:text="${userRole.name}"></td>
								<td>
									<form th:action="@{'/admin/remove-role/'+${user.id}+'/' +${userRole.id}}"
										onclick="return confirm('Are you sure you want to unassign?')" method="post">
										<button type="submit" class="btn btn-danger">
											<i class=" icon_plus_alt2"></i>Unassign</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</section>
		<br>
		<br>
		<section class="panel">
			<h4>
				Roles current user is not Assigned
			</h4>
			<div class="panel-body">
				<table class="table table-striped table-advance table-hover">
					<tbody>
						<tr>
							<th>#</th>
							<th><i class="icon_profile"></i> Name</th>
							<th><i class="icon_calendar"></i> Description</th>
							<th><i class="icon_cogs"></i> Action</th>
						</tr>
						<tr th:each="userNotRole, stat:${userNotRoles}">
							<td th:text="${stat.count}">1</td>
							<td th:text="${userNotRole.name}"></td>
							<td th:text="${userNotRole.description}"></td>
							<td>
								<div class="btn-group">
									<form th:action="@{'/admin/assign-role/'+${user.id}+'/' +${userNotRole.id}}"
										onclick="return confirm('Are you sure you want to assign?')" method="post">
										<button type="submit" class="btn btn-success"><i
												class="icon_plus_alt2"></i>Assign</button>
									</form>
								</div>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>

	</main><!-- =====End #main===== -->

	<!-- =====footer===== -->
	<th:block th:insert="~{partials/_footer}" />
</body>

</html>
