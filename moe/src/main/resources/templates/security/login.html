<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <th:block th:replace="~{partials/_header :: common_header(~{::title/text()},~{::link},~{::meta})}">
    <!-- Custom meta data for this template-->
    <meta name="description" content="meo login page">
    <meta name="author" content="mfano">
    <!-- Custom title for this page-->
    <title>MoE | Login</title>
    <!-- Custom styles for this page-->
  </th:block>
</head>

<body>

  <main>

    <section class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">

            <div class="d-flex justify-content-center py-4">
              <a href="/" class="logo d-flex align-items-center w-auto">
                <img th:src="@{/img/mfano.png}" alt="">
                <span class="d-none d-lg-block">mfano</span>
              </a>
            </div><!-- End Logo -->

            <div class="card mb-3">

              <div class="card-body">


                <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
                <div th:if="${message}" class="alert alert-success py-2" th:text="${message}"></div>

                <form class="row g-3 py-2 needs-validation" th:action="@{/login}" method="post" novalidate>

                  <div class="col-12">
                    <label for="Username" class="form-label">Username</label>
                    <div class="input-group has-validation">
                      <input type="text" name="username" class="form-control" id="Username" required>
                      <button class="input-group-text btn btn-outline-secondary" type="button"
                        onclick="togglePassword('Username', this)">
                        <i class="bi bi-eye"></i>
                      </button>
                      <div class="invalid-feedback">Please enter your username.</div>
                    </div>
                  </div>

                  <div class="col-12">
                    <label for="Password" class="form-label">Password</label>
                    <div class="input-group has-validation">
                      <input type="password" name="password" class="form-control" id="Password" required>
                      <button class="input-group-text btn btn-outline-secondary" type="button"
                        onclick="togglePassword('Password', this)">
                        <i class="bi bi-eye"></i>
                      </button>
                      <div class="invalid-feedback">Please enter your password!</div>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" name="remember" value="true" id="rememberMe">
                      <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                  </div>
                  <div class="col-12">
                    <button class="btn btn-primary w-100" type="submit">Login</button>
                  </div>

                  <a th:href="@{/security/forgot}">Forgot Password?</a>
                </form>

              </div>
            </div>

          </div>
        </div>
      </div>

    </section>

  </main><!-- End #main -->

  <script>
    function togglePassword(fieldId, button) {
      const input = document.getElementById(fieldId);
      const icon = button.querySelector("i");

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
      } else {
        input.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
      }
    }
  </script>

</body>

</html>
